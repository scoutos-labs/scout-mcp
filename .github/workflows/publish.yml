name: Version and Publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      bump:
        description: "Semver bump type (patch, minor, major, prerelease)"
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
          - prerelease

permissions:
  contents: write
  id-token: write

jobs:
  version-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Determine bump type
        id: bump
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            # Extract version from the release tag (e.g., v1.2.3 → 1.2.3)
            TAG="${{ github.event.release.tag_name }}"
            VERSION="${TAG#v}"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "Setting version to $VERSION from release tag"
          else
            BUMP="${{ inputs.bump }}"
            echo "bump=$BUMP" >> "$GITHUB_OUTPUT"
            echo "Will bump with $BUMP"
          fi

      - name: Bump version (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: |
          NEW_VERSION=$(npm version ${{ steps.bump.outputs.bump }} --no-git-tag-version)
          echo "New version: $NEW_VERSION"
          git add package.json
          git commit -m "chore: release $NEW_VERSION"
          git tag "${NEW_VERSION}"
          git push origin main --tags

      - name: Set version from release tag
        if: github.event_name == 'release'
        run: |
          npm version ${{ steps.bump.outputs.version }} --no-git-tag-version --allow-same-version

      - name: Pack check
        run: npm pack --dry-run

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}